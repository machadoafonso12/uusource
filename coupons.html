<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UUSource — Coupons</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04060f;--surface:#0d1225;--surface2:#111830;
  --border:rgba(99,137,255,0.12);--border2:rgba(99,137,255,0.28);
  --blue:#4f8fff;--blue2:#7eb3ff;--blue-glow:rgba(79,143,255,0.35);
  --blue-dim:rgba(79,143,255,0.08);
  --text:#eef2ff;--muted:#5a6a9a;--muted2:#3d4f7a;--card:#0a0f1e;
}
html{scroll-behavior:smooth}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(79,143,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(79,143,255,0.025) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.orb1{width:500px;height:500px;background:rgba(79,143,255,0.08);top:-100px;right:-100px}
.orb2{width:400px;height:400px;background:rgba(244,114,182,0.05);bottom:-100px;left:-100px}

/* NAV */
nav{position:sticky;top:0;z-index:100;background:rgba(4,6,15,0.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-top{display:flex;align-items:center;justify-content:space-between;padding:12px 32px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;background:linear-gradient(135deg,#fff,var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.logo-dot{display:inline-block;width:8px;height:8px;background:var(--blue);border-radius:50%;margin-left:2px;vertical-align:middle;margin-bottom:3px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--blue-glow)}50%{box-shadow:0 0 0 8px transparent}}
.nav-right{display:flex;align-items:center;gap:10px}
.back-home{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:500;padding:8px 16px;border-radius:10px;text-decoration:none;transition:all .2s}
.back-home:hover{border-color:var(--border2);color:var(--text)}

/* PAGE */
.page{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:48px 32px 80px}

/* HEADER */
.page-hdr{text-align:center;margin-bottom:48px}
.page-eyebrow{display:inline-flex;align-items:center;gap:8px;background:var(--blue-dim);border:1px solid var(--border2);color:var(--blue2);font-size:11px;font-weight:700;padding:5px 16px;border-radius:100px;margin-bottom:16px;letter-spacing:.5px}
.page-hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,72px);letter-spacing:2px;margin-bottom:10px;background:linear-gradient(135deg,#fff,var(--blue2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-hdr p{color:var(--muted);font-size:15px;max-width:460px;margin:0 auto}

/* AGENT SELECTOR */
.agent-selector{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:40px}
.agent-sel-btn{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:12px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:var(--muted);transition:all .22s;font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden}
.agent-sel-btn::before{content:'';position:absolute;inset:0;background:var(--blue-dim);opacity:0;transition:opacity .22s}
.agent-sel-btn:hover{border-color:var(--border2);color:var(--text);transform:translateY(-2px)}
.agent-sel-btn:hover::before{opacity:1}
.agent-sel-btn.active{border-color:var(--blue);color:var(--blue2);box-shadow:0 0 20px rgba(79,143,255,0.2)}
.agent-sel-btn.active::before{opacity:1}
.agent-sel-btn img{width:24px;height:24px;border-radius:7px;position:relative;z-index:1}
.agent-sel-btn span{position:relative;z-index:1}

/* ACTIVE AGENT HERO */
.agent-hero{display:none;background:linear-gradient(135deg,#0a1628,#0d1f3c,#0a1628);border:1px solid var(--border2);border-radius:22px;padding:28px 32px;margin-bottom:32px;display:none;align-items:center;gap:24px}
.agent-hero.show{display:flex}
.agent-hero-logo{width:64px;height:64px;border-radius:16px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.agent-hero-logo img{width:52px;height:52px;object-fit:contain;border-radius:10px}
.agent-hero-info h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:4px}
.agent-hero-info p{color:var(--muted);font-size:13px;margin-bottom:12px}
.agent-hero-signup{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;padding:9px 20px;border-radius:10px;text-decoration:none;box-shadow:0 0 18px var(--blue-glow);transition:opacity .2s}
.agent-hero-signup:hover{opacity:.9}

/* COUPONS GRID */
.coupons-section h3{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.coupons-section h3 span{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;background:var(--blue-dim);border:1px solid var(--border2);color:var(--blue2);padding:3px 10px;border-radius:6px}
.coupons-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:48px}
.coupon-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px;position:relative;overflow:hidden;transition:all .22s}
.coupon-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 32px rgba(79,143,255,0.1)}
.coupon-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(135deg,var(--blue),#2563eb);border-radius:4px 0 0 4px}
.coupon-card-exclusive::before{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.c-code{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:var(--blue2);margin-bottom:4px}
.c-code-exclusive{color:#fbbf24}
.c-desc{font-size:12px;color:var(--muted);line-height:1.5}
.c-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-bottom:6px;letter-spacing:.5px}
.c-tag-exclusive{background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.2)}
.c-tag-normal{background:var(--blue-dim);color:var(--blue2);border:1px solid var(--border2)}
.copy-btn{background:var(--surface2);border:1.5px solid var(--border2);color:var(--blue2);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:9px 18px;border-radius:10px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.copy-btn:hover{background:linear-gradient(135deg,var(--blue),#2563eb);color:#fff;border-color:transparent;box-shadow:0 0 14px var(--blue-glow)}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.3;display:block}
.empty p{font-size:14px;line-height:1.6;max-width:300px;margin:0 auto}

/* NO AGENT SELECTED */
.select-prompt{text-align:center;padding:60px 20px;color:var(--muted)}
.select-prompt-icon{font-size:48px;margin-bottom:14px;display:block;opacity:.3}

@media(max-width:640px){
  .page{padding:32px 16px 60px}
  .nav-top{padding:10px 16px}
  .agent-hero{flex-direction:column;align-items:flex-start;padding:20px}
  .coupons-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<nav>
  <div class="nav-top">
    <a class="logo" href="index.html">UUSource<span class="logo-dot"></span></a>
    <div class="nav-right">
      <a class="back-home" href="index.html">← Back to Search</a>
    </div>
  </div>
</nav>

<div class="page">
  <div class="page-hdr">
    <div class="page-eyebrow">🎟️ Exclusive codes</div>
    <h1>Agent Coupons</h1>
    <p>Select an agent below to see available coupon codes and exclusive discounts</p>
  </div>

  <div class="agent-selector" id="agent-selector"></div>

  <div class="agent-hero" id="agent-hero">
    <div class="agent-hero-logo"><img id="agent-hero-logo" src="" alt=""></div>
    <div class="agent-hero-info">
      <h2 id="agent-hero-name"></h2>
      <p id="agent-hero-desc"></p>
      <a class="agent-hero-signup" id="agent-hero-signup" href="#" target="_blank">Sign up & use coupons →</a>
    </div>
  </div>

  <div id="coupons-area">
    <div class="select-prompt">
      <span class="select-prompt-icon">👆</span>
      <p>Select an agent above to see available coupon codes</p>
    </div>
  </div>
</div>

<script>
const AGENTS_DATA=[
  {
    key:'cnfans',name:'CNFans',domain:'cnfans.com',
    url:'https://cnfans.com/?ref=uusource',
    desc:'Top rated agent with excellent QC photos and fast support.',
    coupons:[
      {code:'CNFANS10',desc:'10% off service fee on all orders',exclusive:false},
      {code:'NEWUSER5',desc:'5 CNY discount for new users',exclusive:false},
    ]
  },
  {
    key:'kakobuy',name:'KakoBuy',domain:'kakobuy.com',
    url:'https://kakobuy.com/sign-up?inviteCode=uusource',
    desc:'Modern platform growing fast with great new user promotions.',
    coupons:[
      {code:'KAKO10',desc:'10% off shipping fee on first haul',exclusive:false},
      {code:'NEWKAKO',desc:'New user welcome discount',exclusive:false},
    ]
  },
  {
    key:'sugargoo',name:'Sugargoo',domain:'sugargoo.com',
    url:'https://www.sugargoo.com/#/home/index?partnerCode=uusource',
    desc:'Free QC photos and competitive shipping rates.',
    coupons:[
      {code:'SUGAR5',desc:'5% discount on service fee',exclusive:false},
      {code:'FREEQC',desc:'Free QC photos on first haul',exclusive:false},
    ]
  },
  {
    key:'mulebuy',name:'Mulebuy',domain:'mulebuy.com',
    url:'https://www.mulebuy.com?ref=uusource',
    desc:'Low service fees, great for saving on every order.',
    coupons:[
      {code:'MULE10',desc:'10% off service fee for new users',exclusive:false},
      {code:'MULENEW',desc:'5 CNY welcome coupon',exclusive:false},
    ]
  },
  {
    key:'hipobuy',name:'Hipobuy',domain:'hipobuy.com',
    url:'https://www.hipobuy.com?ref=uusource',
    desc:'Solid reputation with great customer service.',
    coupons:[
      {code:'HIPO5',desc:'5% off service fee',exclusive:false},
      {code:'HIPONEW',desc:'New user exclusive discount',exclusive:false},
    ]
  },
  {
    key:'superbuy',name:'Superbuy',domain:'superbuy.com',
    url:'https://www.superbuy.com/en/page/login/?partnercode=uusource',
    desc:'One of the first agents. Great for large and diverse orders.',
    coupons:[
      {code:'SUPER10',desc:'10 CNY off first order',exclusive:false},
      {code:'SUPERNEW',desc:'Welcome discount for new signups',exclusive:false},
    ]
  },
  {
    key:'pandabuy',name:'Pandabuy',domain:'pandabuy.com',
    url:'https://www.pandabuy.com/signup?inviteCode=uusource',
    desc:'Most used by the community. Modern interface and fast support.',
    coupons:[
      {code:'PANDA10',desc:'10% off first shipping fee',exclusive:false},
      {code:'PANDANEW',desc:'5 CNY off orders over 150 CNY',exclusive:false},
    ]
  },
  {
    key:'acbuy',name:'Acbuy',domain:'acbuy.com',
    url:'https://www.acbuy.com?ref=uusource',
    desc:'Reliable agent with good pricing and support.',
    coupons:[
      {code:'ACBUY10',desc:'10% off service fee',exclusive:false},
      {code:'ACNEW',desc:'New user welcome coupon',exclusive:false},
    ]
  },
  {
    key:'allchinabuy',name:'AllChinaBuy',domain:'allchinabuy.com',
    url:'https://www.allchinabuy.com?partnercode=uusource',
    desc:'Growing platform with great sign-up promotions.',
    coupons:[
      {code:'ACB5',desc:'5% discount on all orders',exclusive:false},
      {code:'ACBNEW',desc:'Welcome bonus for new users',exclusive:false},
    ]
  },
  {
    key:'oopbuy',name:'Oopbuy',domain:'oopbuy.com',
    url:'https://www.oopbuy.com?ref=uusource',
    desc:'Modern interface with competitive service fees.',
    coupons:[
      {code:'OOP10',desc:'10% off service fee',exclusive:false},
      {code:'OOPNEW',desc:'Exclusive welcome code',exclusive:false},
    ]
  },
];

// Build selector
const selector=document.getElementById('agent-selector');
AGENTS_DATA.forEach(a=>{
  const btn=document.createElement('button');
  btn.className='agent-sel-btn';
  btn.innerHTML=`<img src="https://www.google.com/s2/favicons?sz=64&domain=${a.domain}" alt="${a.name}" onerror="this.style.display='none'"><span>${a.name}</span>`;
  btn.onclick=()=>selectAgent(a.key,btn);
  selector.appendChild(btn);
});

function selectAgent(key,btn){
  document.querySelectorAll('.agent-sel-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const a=AGENTS_DATA.find(x=>x.key===key);
  if(!a)return;

  // Show agent hero
  document.getElementById('agent-hero-logo').src=`https://www.google.com/s2/favicons?sz=128&domain=${a.domain}`;
  document.getElementById('agent-hero-name').textContent=a.name;
  document.getElementById('agent-hero-desc').textContent=a.desc;
  document.getElementById('agent-hero-signup').href=a.url;
  document.getElementById('agent-hero').classList.add('show');

  // Render coupons
  const area=document.getElementById('coupons-area');
  if(!a.coupons||a.coupons.length===0){
    area.innerHTML=`<div class="empty"><span class="empty-icon">🔍</span><p>No coupon codes available for ${a.name} right now. Check back soon!</p></div>`;
    return;
  }
  area.innerHTML=`
    <div class="coupons-section">
      <h3>Available Codes <span>${a.coupons.length} codes</span></h3>
      <div class="coupons-grid">
        ${a.coupons.map(c=>`
          <div class="coupon-card${c.exclusive?' coupon-card-exclusive':''}">
            <div>
              <div class="c-tag ${c.exclusive?'c-tag-exclusive':'c-tag-normal'}">${c.exclusive?'★ EXCLUSIVE':'COUPON'}</div>
              <div class="c-code${c.exclusive?' c-code-exclusive':''}">${c.code}</div>
              <div class="c-desc">${c.desc}</div>
            </div>
            <button class="copy-btn" onclick="copyCoupon('${c.code}',this)">Copy</button>
          </div>`).join('')}
      </div>
    </div>`;
}

function copyCoupon(code,btn){
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='Copied! ✓';
    btn.style.background='linear-gradient(135deg,#10b981,#059669)';
    btn.style.color='#fff';btn.style.borderColor='transparent';
    setTimeout(()=>{btn.textContent='Copy';btn.style.background='';btn.style.color='';btn.style.borderColor=''},2500);
  });
}

// Auth check
if(localStorage.getItem('uu_logged_in')!=='true'){window.location.href='login.html';}
</script>
</body>
</html>
